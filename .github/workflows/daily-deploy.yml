name: Daily deploy

on:
  schedule:
    - cron: '0 2 * * *' # 每天 UTC 02:00（北京时间同日 10:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate answer pages and sitemap
        run: node generate-answers-deepseek.mjs --html-only

      - name: Test and build
        run: |
          npm test
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: dist
