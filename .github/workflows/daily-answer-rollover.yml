name: Daily answer pages rollover

# 定时任务说明（若「从未执行」请逐项核对）：
# 1) schedule 只在「默认分支」上触发；请确认 Settings → General 里默认分支是 main。
# 2) Fork 仓库默认不跑定时任务，需在 Actions 里为该仓库启用 workflows。
# 3) 仓库长期无活动可能被暂停 Actions，任意 push 可唤醒。
# 4) cron 为 UTC：0 1 * * * = 每天 UTC 01:00，非北京时间。
# 5) 可随时在 Actions → 本 workflow → Run workflow 手动验证。

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate HTML and sitemap (cache only, no API call)
        run: node generate-answers-deepseek.mjs --html-only
        # 需要仓库里的 scripts/idiom-cache.json 与 public/answer/

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production

      - name: Vercel production build (includes updated public/)
        run: npx vercel build --prod

      - name: Deploy prebuilt to Vercel production
        run: npx vercel deploy --prebuilt --prod --yes
