name: Daily answer pages rollover

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate HTML and sitemap (cache only, no API call)
        run: node generate-answers-deepseek.mjs --html-only
        # 不需要 DEEPSEEK_API_KEY

      - name: Test and build
        run: |
          npm test
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: dist
