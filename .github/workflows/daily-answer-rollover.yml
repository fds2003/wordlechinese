name: Daily answer pages rollover

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate HTML and sitemap (cache only, no API call)
        run: node generate-answers-deepseek.mjs --html-only
        # 不需要 DEEPSEEK_API_KEY

      - name: Pull Vercel env (production)
        run: npx vercel pull --yes --environment=production

      - name: Test
        run: npm test

      - name: Vercel build (bundles updated public/ into output)
        run: npx vercel build --prod

      - name: Deploy prebuilt to Vercel production
        run: npx vercel deploy --prebuilt --prod --yes
