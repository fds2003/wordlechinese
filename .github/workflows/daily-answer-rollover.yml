name: Daily answer pages rollover

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Regenerate HTML and sitemap (cache only, no API call)
        run: node generate-answers-deepseek.mjs --html-only
        # 需要仓库里的 scripts/idiom-cache.json 与 public/answer/

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production

      - name: Vercel production build (includes updated public/)
        run: npx vercel build --prod

      - name: Deploy prebuilt to Vercel production
        run: npx vercel deploy --prebuilt --prod --yes
