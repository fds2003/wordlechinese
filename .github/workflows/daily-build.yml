name: Daily build

on:
  schedule:
    # 每天 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: |
          npm ci
          npm test
          npm run build
